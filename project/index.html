<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>
</head>
<body>

<h1>Todo</h1>

<input id="taskInput" placeholder="Новая задача" />
<button onclick="addTask()">Добавить</button>

<ul id="taskList"></ul>

<script>
const API = 'http://localhost:3000/tasks';
const TOKEN = '12345';

async function loadTasks() {
  const res = await fetch(API, {
    headers: {
        Authorization: TOKEN
    } 
  });
  
  const tasks = await res.json();

  if (!Array.isArray(tasks)) {
    console.error('Ошибка от сервера:', tasks);
    return;
 }

  const list = document.getElementById('taskList');
  list.innerHTML = '';

  tasks.forEach(task => {
  const li = document.createElement('li');

  li.innerHTML = `
      <input type="checkbox" ${task.completed ? 'checked' : ''} 
        onchange="toggleTask(${task.id}, this.checked)" />

      <input value="${task.title}" id="input-${task.id}" />

      <button onclick="updateTask(${task.id})">💾</button>
      <button onclick="deleteTask(${task.id})">❌</button>
    `;

    list.appendChild(li);
  });
}

async function addTask() {
  const input = document.getElementById('taskInput');

  await fetch(API, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': TOKEN
    },
    body: JSON.stringify({ title: input.value })
  });

  input.value = '';
  loadTasks();
}

async function deleteTask(id) {
  await fetch(API + '/' + id, {
    method: 'DELETE'
    headers: {
      'Content-Type': 'application/json',
      'Authorization': TOKEN
    }
  });

  loadTasks();
}

async function toggleTask(id, completed) {
  const input = document.getElementById(`input-${id}`);

  await fetch(API + '/' + id, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': TOKEN
    },
    body: JSON.stringify({
      title: input.value,
      completed: completed
    })
  });

  loadTasks();
}

async function updateTask(id) {
  const input = document.getElementById(`input-${id}`);

  // ⚠️ важно — берем текущее состояние чекбокса
  const checkbox = input.previousElementSibling;

  await fetch(API + '/' + id, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': TOKEN
   },
    body: JSON.stringify({
      title: input.value,
      completed: checkbox.checked
    })
  });

  loadTasks();
}

loadTasks();
</script>

</body>
</html>
